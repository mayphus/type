name: deploy-k3s

concurrency:
  group: deploy-k3s-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - "*.rkt"
      - "rime/**"
      - "schema/**"
      - "static/**"
      - "tools/**"
      - "Dockerfile"
      - ".dockerignore"
      - "k8s.rkt"
      - ".github/workflows/deploy-k3s.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy Racket App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/mayphus/rime-config
      IMAGE_TAG: ${{ github.sha }}
      K8S_API_SERVER: https://100.116.247.67:6443
    steps:
      - name: Checkout rime-config
        uses: actions/checkout@v6.0.2

      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: x64
          distribution: full
          variant: CS
          version: stable

      - name: Install preview renderer
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends librsvg2-bin

      - name: Generate k8s manifests
        run: racket k8s.rkt

      - name: Check generated k8s manifests
        run: racket -e '(require "k8s.rkt") (check-k8s!)'

      - name: Validate generated profiles
        run: racket -e '(require "build.rkt") (build-profile! "desktop") (build-profile! "all")'

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Racket app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          hostname: github-actions-rime-config
          tags: tag:ci

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' '${{ secrets.KUBECONFIG_PB62 }}' > "$HOME/.kube/config"
          perl -0pi -e 's|server: https://[^\s]+:6443|server: $ENV{K8S_API_SERVER}|g' "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Sync GHCR pull secret
        shell: bash
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl -n rime-config create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username=mayphus \
            --docker-password='${{ secrets.GHCR_PULL_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests
        shell: bash
        run: |
          kubectl apply -k k8s
          kubectl -n rime-config set image deployment/rime-config app=${IMAGE_NAME}:${IMAGE_TAG}
          if ! kubectl -n rime-config rollout status deployment/rime-config --timeout=600s; then
            kubectl -n rime-config get pods -l app=rime-config -o wide
            for pod in $(kubectl -n rime-config get pods -l app=rime-config -o name); do
              kubectl -n rime-config logs "$pod" --all-containers=true --tail=200 || true
              kubectl -n rime-config logs "$pod" --all-containers=true --previous --tail=200 || true
            done
            kubectl -n rime-config describe deployment/rime-config
            kubectl -n rime-config describe pods -l app=rime-config
            exit 1
          fi
