name: update-dicts

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-dicts
  cancel-in-progress: false

jobs:
  update:
    name: Update dictionaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout input-foundry
        uses: actions/checkout@v6.0.2

      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: x64
          distribution: full
          variant: CS
          version: stable

      - name: Install preview renderer
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends librsvg2-bin

      - name: Update dictionary files
        run: racket -e '(require "build/update-dicts.rkt") (update-dicts!)'

      - name: Run Racket tests
        run: raco test test

      - name: Generate deploy artifacts
        run: racket -e '(require "build/k8s.rkt") (render-k8s-directory! (string->path "tmp/k8s")) (render-dockerfile!)'

      - name: Check deploy artifacts
        run: racket -e '(require "build/k8s.rkt") (check-k8s-directory! (string->path "tmp/k8s")) (check-dockerfile!)'

      - name: Validate generated profiles
        run: |
          racket main.rkt build --schemas double-pinyin-flypy,cangjie6 --artifact rime --profile-name desktop
          racket main.rkt build --schemas all --artifact yuanshu --profile-name all

      - name: Create update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/update-rime-dicts
          commit-message: "chore: update rime dictionaries"
          title: "chore: update rime dictionaries"
          body: |
            Automated refresh of vendored Rime dictionary data.

            Validation:
            - `raco test test`
            - `racket main.rkt build --schemas double-pinyin-flypy,cangjie6 --artifact rime --profile-name desktop`
            - `racket main.rkt build --schemas all --artifact yuanshu --profile-name all`
          add-paths: |
            assets/rime/**
